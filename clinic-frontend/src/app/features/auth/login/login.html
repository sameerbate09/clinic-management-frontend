
    <mat-card class="login-card">

      <div class="brand-section">
        <mat-icon class="logo-icon">medical_services</mat-icon>
        <h1>Clinic Admin</h1>
      </div>

      <mat-card-header>
        <mat-card-title>Welcome Back</mat-card-title>
        <mat-card-subtitle>Please login to your account</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Username</mat-label>
            <input matInput formControlName="username">
            <mat-icon matSuffix>person</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput type="password" formControlName="password">
            <mat-icon matSuffix>lock</mat-icon>
          </mat-form-field>

          <div class="actions">
            <mat-checkbox color="primary">Remember me</mat-checkbox>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          <button mat-flat-button color="primary" class="login-button" type="submit">
            LOGIN
          </button>

        </form>
      </mat-card-content>

    </mat-card>
