<div class="form-container">
    <div class="header-section">
        <div class="breadcrumb">
            <mat-icon (click)="goBack()" class="cursor-pointer">arrow_back</mat-icon>
            <span>
                <a routerLink="/patients" class="link">Patients</a> / <b>Add Patient</b>
            </span>
        </div>
    </div>

    <mat-card class="form-card">
        <form class="patient-form" [formGroup]="patientForm" (ngSubmit)="onSubmit()">

            <section class="form-section">
                <h3 class="section-title">Basic Information</h3>
                <div class="form-grid">

                    <!-- Name -->
                    <div class="form-field">
                        <label>Full Name *</label>
                        <mat-form-field appearance="fill">
                            <input matInput placeholder="Enter full name" formControlName="name">
                        </mat-form-field>
                    </div>

                    <!-- Gender -->
                    <div class="form-field">
                        <label>Gender *</label>
                        <mat-form-field appearance="fill">
                            <mat-select placeholder="Select gender" formControlName="gender">
                                <mat-option value="male">Male</mat-option>
                                <mat-option value="female">Female</mat-option>
                            </mat-select>
                        </mat-form-field>
                    </div>

                    <!-- Age -->
                    <div class="form-field">
                        <label>Age *</label>
                        <mat-form-field appearance="fill">
                            <input matInput type="number" placeholder="Enter age" formControlName="age">
                        </mat-form-field>
                    </div>

                    <!-- Mobile -->
                    <div class="form-field">
                        <label>Mobile *</label>
                        <div class="mobile-input-group">

                            <mat-form-field appearance="fill" class="country-code">
                                <mat-select value="+91">
                                    <mat-option value="+91">+91</mat-option>
                                </mat-select>
                            </mat-form-field>

                            <mat-form-field appearance="fill" class="phone-number">
                                <input matInput placeholder="10 digit number" formControlName="mobile">
                            </mat-form-field>

                        </div>
                    </div>

                    <!-- Blood Group -->
                    <div class="form-field">
                        <label>Blood Group *</label>
                        <mat-form-field appearance="fill">
                            <mat-select placeholder="Select blood group" formControlName="bloodGroup">
                                <mat-option value="A+">A+</mat-option>
                                <mat-option value="O+">O+</mat-option>
                            </mat-select>
                        </mat-form-field>
                    </div>

                </div>
            </section>

            <hr class="section-divider">

            <!-- Address -->
            <section class="form-section" formGroupName="address">
                <h3 class="section-title">Address (Optional)</h3>
                <div class="form-grid">

                    <div class="form-field">
                        <label>Address</label>
                        <mat-form-field appearance="fill">
                            <input matInput placeholder="Enter address" formControlName="street">
                        </mat-form-field>
                    </div>

                    <div class="form-field">
                        <label>City</label>
                        <mat-form-field appearance="fill">
                            <input matInput placeholder="Enter city" formControlName="city">
                        </mat-form-field>
                    </div>

                    <div class="form-field">
                        <label>Pin Code</label>
                        <mat-form-field appearance="fill">
                            <input matInput placeholder="Enter pin code" formControlName="pincode">
                        </mat-form-field>
                    </div>

                </div>
            </section>

            <!-- Actions -->
            <div class="form-actions">
                <button mat-flat-button color="primary" class="btn-submit" type="submit">
                    Add Patient
                </button>

                <button mat-stroked-button class="btn-cancel" type="button" (click)="goBack()">
                    Cancel
                </button>
            </div>

        </form>
    </mat-card>
</div>
